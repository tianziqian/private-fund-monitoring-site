<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理人库 | 私募资产挖掘机</title>
    <link rel="stylesheet" href="../personnel-center/styles.css?v=20260627-indigo" />
      <link rel="stylesheet" href="../assets/platform.css?v=20260628-unified" />
    <style>
      .ai-mgr-section { border: 1px solid #dfe3ee; border-radius: 10px; background: #fafbff; }
      .ai-mgr-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .ai-mgr-head h4 { margin: 0; }
      .ai-mgr-btn { border: 0; border-radius: 8px; padding: 7px 16px; cursor: pointer;
        background: linear-gradient(135deg, #3d5afe, #536dfe); color: #fff; font-size: 13px; font-weight: 600; }
      .ai-mgr-btn:hover { filter: brightness(1.05); }
      .ai-mgr-btn:disabled { opacity: .6; cursor: default; }
      .ai-mgr-body { margin-top: 14px; }
      .ai-mgr-verdict { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        padding: 12px 14px; border-radius: 8px; background: #eef1fb; margin-bottom: 12px; }
      .ai-mgr-verdict strong { font-size: 14px; color: #1a2340; }
      .ai-mgr-risk-badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; color: #fff; white-space: nowrap; }
      .ai-mgr-risk-low  .ai-mgr-risk-badge { background: #2e7d32; }
      .ai-mgr-risk-medium .ai-mgr-risk-badge { background: #ef6c00; }
      .ai-mgr-risk-high .ai-mgr-risk-badge { background: #c62828; }
      .ai-mgr-risk-high  { background: #fdecec; }
      .ai-mgr-risk-medium { background: #fff4e6; }
      .ai-mgr-sections { display: grid; gap: 10px; }
      .ai-mgr-sec { padding: 10px 12px; border-radius: 8px; border-left: 3px solid #b7c0e0; background: #fff; }
      .ai-mgr-sec p { margin: 6px 0 0; font-size: 13px; line-height: 1.65; color: #333; }
      .ai-mgr-sec-head { display: flex; align-items: center; gap: 8px; }
      .ai-mgr-flag-tag { font-size: 11px; padding: 1px 8px; border-radius: 999px; color: #fff; background: #8894b8; }
      .ai-mgr-flag-warn { border-left-color: #ef6c00; }
      .ai-mgr-flag-warn .ai-mgr-flag-tag { background: #ef6c00; }
      .ai-mgr-flag-risk { border-left-color: #c62828; }
      .ai-mgr-flag-risk .ai-mgr-flag-tag { background: #c62828; }
      .ai-mgr-keypoints { margin-top: 12px; padding: 10px 14px; border-radius: 8px; background: #f4f6fd; }
      .ai-mgr-keypoints h5 { margin: 0 0 6px; font-size: 13px; color: #1a2340; }
      .ai-mgr-keypoints ul { margin: 0; padding-left: 18px; }
      .ai-mgr-keypoints li { font-size: 13px; line-height: 1.6; color: #333; }
      .ai-mgr-note { margin-top: 10px; font-size: 11px; }
    </style>
</head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="platform-brand" href="../">私募资产挖掘机</a>
        <nav class="module-nav" aria-label="主模块">
          <a href="../filing-center/">产品备案概览</a>
          <a href="../fund-discovery/">净值跟踪</a>
          <a href="../change-center/">人员变动</a>
          <a href="../sentiment-center/">资讯</a>
          <a href="../due-diligence-center/">尽调报告</a>
          <a class="active" href="./">管理人库</a>
          <a href="../personnel-center/">人员库</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="module-header">
        <div>
          <div class="module-kicker">MANAGER CENTER</div>
          <h1>管理人库</h1>
          <p>查机构、看规模、看团队结构</p>
        </div>
        <div class="header-stats" id="dataStatus">加载数据中</div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="workbench">
        <div class="search-row">
          <label class="search-box">
            <span>管理人搜索</span>
            <input id="queryInput" type="search" placeholder="输入管理人名称、登记编号、注册地或办公地" />
          </label>
          <button id="resetBtn" class="ghost-btn">重置</button>
        </div>

        <div class="filter-grid">
          <label>
            规模区间
            <select id="scaleFilter"><option value="">全部规模</option></select>
          </label>
          <label>
            注册地
            <select id="registerProvinceFilter"><option value="">全部注册地</option></select>
          </label>
          <label>
            办公地
            <select id="officeProvinceFilter"><option value="">全部办公地</option></select>
          </label>
          <label>
            会员类型
            <select id="memberTypeFilter"><option value="">全部会员类型</option></select>
          </label>
          <label>
            最少人员数
            <input id="minPeopleFilter" type="number" min="0" placeholder="不限" />
          </label>
          <label>
            最少基金数
            <input id="minFundFilter" type="number" min="0" placeholder="不限" />
          </label>
        </div>

        <div class="quick-filters" id="quickFilters">
          <button data-scale="5-10亿元">5-10亿元</button>
          <button data-scale="10-20亿元">10-20亿元</button>
          <button data-scale="20-50亿元">20-50亿元</button>
          <button data-scale="50-100亿元">50-100亿元</button>
          <button data-scale="100亿元以上">100亿元以上</button>
          <button data-filter="reset">清除快捷筛选</button>
        </div>

        <div class="table-toolbar">
          <div>
            <strong id="resultCount">0</strong>
            <span>家匹配管理人</span>
          </div>
          <div class="toolbar-actions">
            <select id="sortSelect">
              <option value="scaleDesc">规模区间：大到小</option>
              <option value="peopleDesc">人员数量：多到少</option>
              <option value="fundDesc">在管基金：多到少</option>
              <option value="registerDateDesc">登记时间：新到旧</option>
              <option value="nameAsc">管理人名称：A-Z</option>
            </select>
            <button id="exportBtn" class="ghost-btn">导出当前结果</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>管理人名称</th>
                <th>登记编号</th>
                <th>规模区间</th>
                <th>注册地</th>
                <th>办公地</th>
                <th>成立时间</th>
                <th>登记时间</th>
                <th>在管基金</th>
                <th>人员数量</th>
              </tr>
            </thead>
            <tbody id="managerTable"></tbody>
          </table>
        </div>

        <div class="pagination">
          <button id="prevPage" class="ghost-btn">上一页</button>
          <span id="pageInfo">第 1 页</span>
          <button id="nextPage" class="ghost-btn">下一页</button>
        </div>
      </section>
    </main>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-panel">
        <button class="close-btn" id="closeDrawer">×</button>
        <div id="drawerContent"></div>
      </div>
    </aside>

    <script src="./app.js?v=20260701-ai-analysis"></script>
  </body>
</html>
